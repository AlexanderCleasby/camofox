apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "camofox.fullname" . }}
  labels:
    {{- include "camofox.labels" . | nindent 4 }}
  {{- with .Values.podAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "camofox.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "camofox.selectorLabels" . | nindent 8 }}
    spec:
      enableServiceLinks: false
      containers:
        - name: camofox
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: api
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            {{- if .Values.vnc.enabled }}
            - name: vnc
              containerPort: {{ .Values.vnc.port }}
              protocol: TCP
            {{- end }}
          env:
            {{- if .Values.vnc.enabled }}
            - name: ENABLE_VNC
              value: "1"
            - name: NOVNC_PORT
              value: {{ .Values.vnc.port | quote }}
            - name: VNC_RESOLUTION
              value: {{ .Values.vnc.resolution | quote }}
            {{- end }}
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if or .Values.secrets.apiKey .Values.secrets.accessKey .Values.secrets.adminKey .Values.secrets.vncPassword }}
            {{- if .Values.secrets.apiKey }}
            - name: CAMOFOX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "camofox.fullname" . }}
                  key: CAMOFOX_API_KEY
            {{- end }}
            {{- if .Values.secrets.accessKey }}
            - name: CAMOFOX_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "camofox.fullname" . }}
                  key: CAMOFOX_ACCESS_KEY
            {{- end }}
            {{- if .Values.secrets.adminKey }}
            - name: CAMOFOX_ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "camofox.fullname" . }}
                  key: CAMOFOX_ADMIN_KEY
            {{- end }}
            {{- if .Values.secrets.vncPassword }}
            - name: VNC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "camofox.fullname" . }}
                  key: VNC_PASSWORD
            {{- end }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "camofox.fullname" . }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
